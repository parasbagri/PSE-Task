  <title>Premier Schools Exhibition (PSE) | Landing Page</title>

  <a href="#main-content" class="skip-link">Skip to main content</a>

      <!-- Left Logo Link -->
      <a href="/" class="header__logo-link" aria-label="Premier Schools Exhibition Home">

      </a>
      
      <!-- Right Registration Button -->
      <a href="#register" class="header__register-btn" aria-label="Register Now for the Exhibition">
        <!-- Arrow Box: 60x60px -->
        <span class="header__register-icon-box">
          <svg class="header__register-arrow" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </span>
        <!-- Text Box: 145x60px -->
        <span class="header__register-text">Register Now</span>
      </a>

    </div>
  </header>

    <!-- Hero Section -->

      <div class="hero__container">
        
        <!-- Left Content Column -->
        <div class="hero__content">
          <h1 class="hero__title">
            <span class="hero__title-sub">Discover Gurugram's</span>
            <span class="hero__title-main">Top 30+ Schools</span>
            <span class="hero__title-tagline">ALL IN ONE PLACE</span>

            <div class="hero__info-divider" aria-hidden="true"></div>
            <div class="hero__info-item">
              <span class="hero__info-title">2-3 August 2025</span>
              <span class="hero__info-detail">Sat-Sun | 10AM - 6PM</span>
            </div>
          </div>
        </div>

        <!-- Center Visual Column -->
        <div class="hero__visual">
          <div class="hero__visual-grid">
            <!-- Oval Card 1 -->
            <div class="hero__oval-card">
              <img src="https://images.unsplash.com/photo-1543002588-bfa74002ed7e?auto=format&fit=crop&w=400&q=80" alt="Girl reading a book" class="hero__oval-img">
            </div>
            <!-- Oval Card 2 -->
            <div class="hero__oval-card">
              <img src="https://images.unsplash.com/photo-1577896851231-70ef18881754?auto=format&fit=crop&w=400&q=80" alt="Children walking to school" class="hero__oval-img">
            </div>
            <!-- Oval Card 3 -->
            <div class="hero__oval-card">
              <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=400&q=80" alt="Boy playing soccer" class="hero__oval-img">
            </div>
            <!-- Oval Card 4 -->
            <div class="hero__oval-card">
              <img src="https://images.unsplash.com/photo-1503919545889-aef636e10ad4?auto=format&fit=crop&w=400&q=80" alt="Smiling school girl" class="hero__oval-img">
            </div>
            <!-- Oval Card 5 -->
            <div class="hero__oval-card">
              <img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30?auto=format&fit=crop&w=400&q=80" alt="Smiling boy portrait" class="hero__oval-img">
            </div>
            <!-- Oval Card 6 -->
            <div class="hero__oval-card">

            </div>
          </div>
        </div>

        <!-- Right Form Column -->
        <div class="hero__form-container">
          <h2 class="hero__form-title">Enquire Now</h2>
          <form action="#" method="POST" class="hero__form">
            
            <div class="hero__form-group">
              <label for="parent-name" class="sr-only">Parent's Name</label>
              <input type="text" id="parent-name" name="parent-name" placeholder="Parent's Name" required class="hero__form-input">
            </div>
            
            <div class="hero__form-group">
              <label for="phone-number" class="sr-only">Phone number</label>
              <input type="tel" id="phone-number" name="phone-number" placeholder="Phone number" required class="hero__form-input">
            </div>
            
            <div class="hero__form-group">
              <label for="grade" class="sr-only">Which grade are you looking for?</label>
              <select id="grade" name="grade" required class="hero__form-select">
                <option value="" disabled selected>Which grade are you looking for?</option>
                <option value="kindergarten">Preschool / Kindergarten</option>
                <option value="primary">Primary (Grades 1-5)</option>
                <option value="middle">Middle School (Grades 6-8)</option>
                <option value="high">High School (Grades 9-12)</option>
              </select>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="hero__submit-btn" aria-label="Submit Enquiry Form">
              <span class="hero__submit-icon-box">
                <svg class="hero__submit-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="7" y1="17" x2="17" y2="7"></line>
                  <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
              </span>
              <span class="hero__submit-text">Submit</span>
            </button>

        </div>
